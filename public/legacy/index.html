    <script>
      (function() {
        var SUPPORT_TEXT = "Patrocinado por Ricardo";
        var AUDIO_SRC = "assets/SafePlayAlert.wav";
        var wasSupportOpen = false;
        var audioRef = null;

        function getAudio() {
          if (audioRef) return audioRef;
          audioRef = new Audio(AUDIO_SRC);
          audioRef.preload = "auto";
          return audioRef;
        }

        function playSupportAudio() {
          try {
            var audio = getAudio();
            audio.currentTime = 0;
            var p = audio.play();
            if (p && typeof p.catch === "function") p.catch(function() {});
          } catch (err) {}
        }

        function findSupportDialog() {
          var dialogs = Array.from(document.querySelectorAll(".p-dialog"));
          return dialogs.find(function(dialog) {
            var header = dialog.querySelector(".p-dialog-header");
            if (!header) return false;
            return (header.textContent || "").toLowerCase().includes("support");
          }) || null;
        }

        function isDialogOpen(dialog) {
          if (!dialog) return false;
          if (dialog.classList.contains("p-dialog-visible")) return true;
          if (dialog.style.display && dialog.style.display.toLowerCase() === "none") return false;
          return dialog.offsetParent !== null;
        }

        function simplifySupportDialog(dialog) {
          if (!dialog) return;
          var content = dialog.querySelector(".p-dialog-content");
          if (!content) return;
          if (content.getAttribute("data-ricardo-simple") === "1") return;

          content.setAttribute("data-ricardo-simple", "1");
          content.innerHTML = "";

          var wrap = document.createElement("div");
          wrap.className = "ricardo-support-wrap";

          var banner = document.createElement("div");
          banner.className = "ricardo-support-banner";
          banner.textContent = SUPPORT_TEXT;

          wrap.appendChild(banner);
          content.appendChild(wrap);
        }

        function refreshSupportState() {
          var dialog = findSupportDialog();
          if (!dialog) {
            wasSupportOpen = false;
            return;
          }

          simplifySupportDialog(dialog);
          var isOpen = isDialogOpen(dialog);
          if (isOpen && !wasSupportOpen) playSupportAudio();
          wasSupportOpen = isOpen;
        }

        document.addEventListener("click", function(ev) {
          var target = ev.target;
          if (!target || !target.closest) return;
          var btn = target.closest("button, a");
          if (!btn) return;

          var hasHeartIcon = !!btn.querySelector(".pi-heart");
          var hasSupportText = (btn.textContent || "").toLowerCase().includes("support");
          if (!hasHeartIcon && !hasSupportText) return;

          playSupportAudio();
          setTimeout(refreshSupportState, 0);
          setTimeout(refreshSupportState, 120);
        }, true);

        var observer = new MutationObserver(function() {
          refreshSupportState();
        });

        window.addEventListener("load", function() {
          observer.observe(document.body, {
            childList: true,
            subtree: true,
            attributes: true,
            attributeFilter: ["class", "style"]
          });
          refreshSupportState();
        });
      })();
    </script>
